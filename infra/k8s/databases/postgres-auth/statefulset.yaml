# ─── CloudNativePG Clusters ───────────────────────────────────────────────────
# Replaces the three single-instance StatefulSets with HA CNPG clusters.
# Each cluster provides 1 primary + 2 streaming replicas with automatic failover.
#
# Services created automatically per cluster:
#   <name>-rw  → primary only        (all writes must go here)
#   <name>-ro  → replicas only       (safe for read-only queries)
#   <name>-r   → any instance        (connection-pool round-robin)
#
# IMPORTANT: DB_URL in deployments must use the -rw service:
#   postgres-auth-rw:5432
#   postgres-blog-rw:5432
#   postgres-feed-rw:5432
#
# Operator installation (one-time, cluster-scoped):
#   kubectl apply -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.23/releases/cnpg-1.23.0.yaml
#
# ArgoCD note: set Prune=false on the inkwell-databases Application so ArgoCD
# never deletes a cluster. A pruned CNPG cluster deletes its PVCs.

# ─── postgres-auth ────────────────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-auth
  namespace: inkwell
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised   # operator elects a new primary on failure

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
    pg_hba:
      - host all all 0.0.0.0/0 scram-sha-256

  bootstrap:
    initdb:
      database: auth_db
      owner: auth_user
      secret:
        name: postgres-auth-secret      # keys: username, password

  storage:
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

---
# ─── postgres-blog ────────────────────────────────────────────────────────────
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-blog
  namespace: inkwell
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
    pg_hba:
      - host all all 0.0.0.0/0 scram-sha-256

  bootstrap:
    initdb:
      database: blog_db
      owner: blog_user
      secret:
        name: postgres-blog-secret

  storage:
    size: 20Gi

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

---
