apiVersion: v1
kind: ServiceAccount
metadata:
  name: inkwell-sa
  namespace: inkwell
  labels:
    app.kubernetes.io/managed-by: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inkwell-role
  namespace: inkwell
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inkwell-rolebinding
  namespace: inkwell
subjects:
  - kind: ServiceAccount
    name: inkwell-sa
    namespace: inkwell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: inkwell-role
