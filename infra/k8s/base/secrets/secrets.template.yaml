# ─── IMPORTANT ──────────────────────────────────────────────────────────────
# Do NOT commit real values to git. This file is a template.
# In production use:
#   Option A: Bitnami Sealed Secrets  (kubeseal encrypts values in git)
#   Option B: External Secrets Operator (pulls from AWS Secrets Manager / Vault)
#
# To create sealed secrets:
#   kubeseal --format yaml < secrets.yaml > sealed-secrets.yaml
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: inkwell-jwt-secrets
  namespace: inkwell
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME_strong_random_64_chars"
  JWT_REFRESH_SECRET: "REPLACE_ME_strong_random_64_chars_refresh"
---
apiVersion: v1
kind: Secret
