# ─── IMPORTANT ──────────────────────────────────────────────────────────────
# Do NOT commit real values to git. This file is a template.
# In production use Bitnami Sealed Secrets or External Secrets Operator.
#
# CloudNativePG bootstrap secrets MUST have both `username` and `password` keys.
# The other keys (AUTH_DB_PASS etc.) are still used by service Deployments.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: inkwell-jwt-secrets
  namespace: inkwell
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME_strong_random_64_chars"
  JWT_REFRESH_SECRET: "REPLACE_ME_strong_random_64_chars_refresh"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth-secret
  namespace: inkwell
type: Opaque
stringData:
  username: "auth_user"           # required by CNPG bootstrap
  password: "REPLACE_ME"         # required by CNPG bootstrap
  AUTH_DB_PASS: "REPLACE_ME"     # used by auth-service Deployment DB_URL
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-blog-secret
  namespace: inkwell
type: Opaque
stringData:
  username: "blog_user"
  password: "REPLACE_ME"
  BLOG_DB_PASS: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-feed-secret
  namespace: inkwell
type: Opaque
stringData:
  username: "feed_user"
  password: "REPLACE_ME"
  FEED_DB_PASS: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: smtp-secret
  namespace: inkwell
type: Opaque
stringData:
  SMTP_HOST: "smtp.gmail.com"
  SMTP_USER: "REPLACE_ME@gmail.com"
  SMTP_PASS: "REPLACE_ME_app_password"
  FROM_EMAIL: "noreply@inkwell.app"
