apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify-service
  namespace: inkwell
  labels:
    app: notify-service
    version: v1
spec:
  replicas: 1           # Single replica — SMTP sender, no state
  selector:
    matchLabels:
      app: notify-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notify-service
        version: v1
    spec:
      serviceAccountName: inkwell-sa-notify-service
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting; sleep 2; done']
      containers:
        - name: notify-service
          image: ghcr.io/sharanch/inkwell/notify-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
              name: http
          envFrom:
            - configMapRef:
                name: notify-service-config
          env:
            - name: SMTP_ENABLED
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_ENABLED
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_HOST
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PASS
            - name: FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: FROM_EMAIL
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notify-service
  namespace: inkwell
  labels:
    app: notify-service
spec:
  selector:
    app: notify-service
  ports:
    - port: 8084
      targetPort: 8084
      name: http