name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/inkwell

jobs:
  # ─── Detect changed services ─────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      auth-service: ${{ steps.filter.outputs.auth-service }}
      blog-service: ${{ steps.filter.outputs.blog-service }}
      feed-service: ${{ steps.filter.outputs.feed-service }}
      notify-service: ${{ steps.filter.outputs.notify-service }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
            auth-service:
              - 'auth-service/**'
            blog-service:
              - 'blog-service/**'
            feed-service:
              - 'feed-service/**'
            notify-service:
              - 'notify-service/**'
            frontend:
              - 'frontend/**'

  # ─── Lint & Test Go services ─────────────────────────────────────────────────
  test-go:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      matrix:
        service: [api-gateway, auth-service, blog-service, feed-service, notify-service]
    if: ${{ needs.changes.outputs[matrix.service] == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.service }}
          args: --timeout=5m

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: go test ./... -race -cover -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Lint & Test Frontend ─────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check || true  # Optional — add tsconfig if needed

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─── Build & Push Docker images ──────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: [test-go, test-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
          - service: auth-service
            context: ./auth-service
          - service: blog-service
            context: ./blog-service
          - service: feed-service
            context: ./feed-service
          - service: notify-service
            context: ./notify-service
          - service: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ─── Update image tags in infra repo (triggers ArgoCD) ───────────────────────
  update-manifests:
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tags in manifests
        run: |
          for service in api-gateway auth-service blog-service feed-service notify-service frontend; do
            NEW_TAG="${{ env.IMAGE_PREFIX }}/${service}:main-${{ steps.sha.outputs.short }}"
            sed -i "s|image: ${{ env.IMAGE_PREFIX }}/${service}:.*|image: ${NEW_TAG}|g" \
              infra/k8s/services/${service}/deployment.yaml 2>/dev/null || true
          done
          # frontend too
          NEW_TAG="${{ env.IMAGE_PREFIX }}/frontend:main-${{ steps.sha.outputs.short }}"
          sed -i "s|image: ${{ env.IMAGE_PREFIX }}/frontend:.*|image: ${NEW_TAG}|g" \
            infra/k8s/services/frontend/deployment.yaml 2>/dev/null || true

      - name: Commit and push updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(infra): update image tags to ${{ steps.sha.outputs.short }} [skip ci]"
          file_pattern: "infra/k8s/**/*.yaml"
